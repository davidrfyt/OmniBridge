<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBridge</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(15, 23, 42, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --neon-blue: #0ea5e9;
            --neon-purple: #a855f7;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 15% 50%, rgba(14, 165, 233, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.15), transparent 25%),
                #020617;
            background-attachment: fixed;
            color: #e2e8f0;
        }

        /* Glassmorphism Classes */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .glass-header {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Message Formatting */
        .msg-assistant {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.9));
            border-left: 3px solid var(--neon-blue);
        }

        .msg-user {
            background: linear-gradient(145deg, rgba(56, 189, 248, 0.15), rgba(14, 165, 233, 0.05));
            border-right: 3px solid var(--neon-purple);
        }

        pre {
            font-family: 'JetBrains Mono', monospace;
            background: #0f172a !important;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            padding: 12px;
            font-size: 0.875rem;
            color: #38bdf8;
            overflow-x: auto;
        }

        .markdown-body {
            color: #cbd5e1;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .markdown-body strong {
            color: #f8fafc;
        }

        .markdown-body p {
            margin-bottom: 0.75rem;
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        /* Button Glow */
        .btn-glow {
            position: relative;
        }

        .btn-glow::after {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            z-index: -1;
            border-radius: 10px;
            filter: blur(10px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .btn-glow:hover::after {
            opacity: 0.6;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col h-screen overflow-hidden">

    <!-- Top Navigation / Header -->
    <header
        class="glass-header px-6 py-4 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 z-20">
        <div class="flex items-center gap-3">
            <div
                class="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-400 to-purple-600 flex items-center justify-center shadow-[0_0_15px_rgba(14,165,233,0.5)]">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
            </div>
            <div>
                <h1 class="text-xl font-extrabold tracking-tight text-white">OMNI<span
                        class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">_BRIDGE</span>
                </h1>
            </div>
        </div>

        <div class="flex flex-wrap items-center gap-4 w-full md:w-auto">
            <div class="flex items-center gap-2 bg-slate-800/50 p-1.5 rounded-lg border border-slate-700/50">
                <select id="tunnel-proto" class="bg-slate-900 border border-slate-700 rounded px-2 py-1 text-sm text-center text-cyan-300 font-mono focus:outline-none focus:border-cyan-500">
                    <option value="http">HTTP</option>
                    <option value="tcp">TCP</option>
                    <option value="udp">UDP</option>
                </select>
                <input type="text" id="tunnel-host" value="localhost"
                    class="w-24 bg-slate-900 border border-slate-700 rounded px-2 py-1 text-sm text-center text-cyan-300 font-mono focus:outline-none focus:border-cyan-500"
                    placeholder="127.0.0.1">
                <span class="text-slate-500 font-bold">:</span>
                <input type="number" id="tunnel-port" value="8080"
                    class="w-16 bg-slate-900 border border-slate-700 rounded px-2 py-1 text-sm text-center text-cyan-300 font-mono focus:outline-none focus:border-cyan-500"
                    placeholder="8080">
                <button id="tunnel-btn"
                    class="text-xs font-bold bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 px-3 py-1.5 rounded text-white shadow-lg transition-all ml-1 uppercase tracking-wider">Deploy
                    Tunnel</button>
            </div>

            <div class="flex items-center gap-2 w-full md:w-auto">
                <div class="relative w-full md:w-64">
                    <select id="project-select"
                        class="w-full appearance-none bg-slate-800/80 border border-slate-600 rounded-lg pl-4 pr-10 py-2.5 text-sm text-white focus:outline-none focus:ring-2 focus:ring-cyan-500 transition-all font-medium">
                        <option value="">Initializing Link...</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7">
                            </path>
                        </svg>
                    </div>
                </div>
                <button id="refresh-projects-btn" title="Refresh Instances"
                    class="bg-slate-800/80 hover:bg-slate-700 text-cyan-400 p-2.5 rounded-lg border border-slate-600 transition-colors shadow-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15">
                        </path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Active Tunnels Bar -->
    <div id="tunnels-container"
        class="bg-slate-900/80 border-b border-slate-800 px-6 py-2 flex flex-wrap gap-3 hidden z-10 font-mono text-xs shadow-inner">
        <!-- Tunnels rendered here -->
    </div>

    <!-- Main Chat Area -->
    <main class="flex-1 overflow-y-auto p-4 md:p-6 lg:px-12 flex flex-col gap-6 relative" id="chat-container">
        <!-- Background Grid Decoration -->
        <div class="absolute inset-0 z-0 pointer-events-none opacity-[0.03]"
            style="background-image: linear-gradient(rgba(255,255,255,1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,1) 1px, transparent 1px); background-size: 40px 40px;">
        </div>

        <div class="text-center z-10 w-full mt-10">
            <div
                class="inline-block glass-panel px-6 py-3 rounded-full border-cyan-500/30 text-cyan-400 text-sm font-mono shadow-[0_0_15px_rgba(6,182,212,0.15)]">
                Connection Established. Awaiting data...
            </div>
        </div>
    </main>

    <!-- Input Area -->
    <footer class="p-4 md:p-6 bg-slate-900/50 backdrop-blur-md border-t border-slate-800 z-20">
        <form id="chat-form" class="max-w-5xl mx-auto relative btn-glow">
            <!-- Image Preview Box -->
            <div id="image-preview-container"
                class="hidden absolute bottom-full mb-2 left-0 right-0 flex gap-2 overflow-x-auto p-2 bg-slate-800/80 rounded-lg border border-slate-600 shadow-lg backdrop-blur-md">
            </div>

            <div
                class="glass-panel rounded-xl flex items-center p-2 border-slate-600/50 focus-within:border-cyan-500/50 transition-colors">

                <button type="button" id="upload-btn" class="p-2 text-slate-400 hover:text-cyan-400 transition-colors"
                    title="Upload Images (Max 5)">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                    </svg>
                </button>
                <input type="file" id="file-upload" class="hidden" accept="image/*" multiple>

                <input type="text" id="chat-input" placeholder="Initialize command sequence... (Paste or Upload images)"
                    autocomplete="off"
                    class="flex-1 bg-transparent border-none px-2 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-0 text-base">

                <button type="submit" id="send-btn"
                    class="bg-cyan-500 hover:bg-cyan-400 text-slate-900 font-bold px-6 py-3 rounded-lg flex items-center justify-center transition-all shadow-[0_0_10px_rgba(6,182,212,0.4)] disabled:opacity-50 min-w-[120px] ml-2 uppercase tracking-wide text-sm">
                    <span>Execute</span>
                    <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                    </svg>
                </button>
            </div>
        </form>
    </footer>

    <script>
        const socket = io();
        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const projectSelect = document.getElementById('project-select');
        const tunnelBtn = document.getElementById('tunnel-btn');
        const tunnelsContainer = document.getElementById('tunnels-container');

        marked.setOptions({ breaks: true });

        function addMessage(text, role) {
            const div = document.createElement('div');
            const isUser = role === 'user';

            div.className = `z-10 max-w-4xl w-full p-5 rounded-2xl animate-fade-in glass-panel ${isUser ? 'msg-user self-end ml-auto' : 'msg-assistant mr-auto'}`;

            const header = document.createElement('div');
            header.className = `text-xs font-bold mb-3 uppercase tracking-wider flex items-center gap-2 ${isUser ? 'text-purple-400 justify-end' : 'text-cyan-400'}`;

            if (!isUser) {
                header.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg> Antigravity AI`;
            } else {
                header.innerHTML = `You <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>`;
            }

            const content = document.createElement('div');
            content.className = 'markdown-body';

            // If it's AI text and looks like simple markdown (no backticks), force pre to maintain formatting
            if (!isUser && !text.includes('```')) {
                content.innerHTML = `<pre style="background:transparent!important; border:none; padding:0; color:inherit; font-family:'Inter',sans-serif; white-space:pre-wrap;">${text}</pre>`;
            } else if (!isUser) {
                content.innerHTML = marked.parse(text);
            } else {
                content.innerHTML = text; // User HTML (for images) should be parsed
            }

            div.appendChild(header);
            div.appendChild(content);

            chatContainer.appendChild(div);
            // Fix: scroll the actual chat container instead of the window
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }

        // Sci-Fi Notification Sound using Web Audio API (no external files needed)
        function playNotificationSound() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();

                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);

                gain.gain.setValueAtTime(0, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);

                osc.connect(gain);
                gain.connect(ctx.destination);

                osc.start();
                osc.stop(ctx.currentTime + 0.2);
            } catch (e) {
                console.log("Audio not supported or blocked");
            }
        }

        function showThinking() {
            if (document.getElementById('thinking-indicator')) return;
            const div = document.createElement('div');
            div.id = 'thinking-indicator';
            div.className = 'z-10 max-w-4xl w-full p-5 rounded-2xl animate-fade-in glass-panel msg-assistant mr-auto';
            div.innerHTML = `
                <div class="text-xs font-bold mb-3 uppercase tracking-wider flex items-center gap-2 text-cyan-400">
                    <svg class="w-4 h-4 animate-spin text-cyan-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 
                    Antigravity AI
                </div>
                <div class="markdown-body text-cyan-400/80 animate-pulse font-mono text-sm">Processing neural streams...</div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }

        function removeThinking() {
            const el = document.getElementById('thinking-indicator');
            if (el) el.remove();
        }

        socket.on('new_message', (msg) => {
            if (msg.text && msg.role === 'assistant') {
                removeThinking();
                addMessage(msg.text, 'assistant');
                playNotificationSound();
            }
        });

        socket.on('history', (msgs) => {
            chatContainer.innerHTML = '<div class="absolute inset-0 z-0 pointer-events-none opacity-[0.03]" style="background-image: linear-gradient(rgba(255,255,255,1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,1) 1px, transparent 1px); background-size: 40px 40px;"></div>';

            if (msgs.length === 0) {
                const emptyMsg = document.createElement('div');
                emptyMsg.className = 'text-center z-10 w-full mt-10';
                emptyMsg.innerHTML = '<div class="inline-block glass-panel px-6 py-3 rounded-full border-slate-600/50 text-slate-400 text-sm font-mono">Communication log empty.</div>';
                chatContainer.appendChild(emptyMsg);
            } else {
                msgs.forEach(m => addMessage(m.text, m.role));
            }
        });

        socket.on('retry_action', (data) => {
            const div = document.createElement('div');
            div.className = 'z-10 mx-auto glass-panel px-4 py-2 rounded-lg border-yellow-500/50 text-yellow-400 text-xs font-mono flex items-center gap-2 animate-fade-in shadow-[0_0_10px_rgba(234,179,8,0.15)] my-2';
            div.innerHTML = `<svg class="w-4 h-4 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg> ${data.message}`;
            chatContainer.appendChild(div);
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        });

        let currentImagesBase64 = [];

        function renderImagePreviews() {
            const container = document.getElementById('image-preview-container');
            container.innerHTML = '';

            if (currentImagesBase64.length === 0) {
                container.classList.add('hidden');
                return;
            }

            container.classList.remove('hidden');
            currentImagesBase64.forEach((base64, idx) => {
                const div = document.createElement('div');
                div.className = 'relative min-w-[80px] w-20 h-20 bg-slate-900 rounded-lg border border-slate-600 overflow-hidden flex-shrink-0';
                div.innerHTML = `
                    <img src="${base64}" class="w-full h-full object-cover">
                    <button type="button" class="absolute top-1 right-1 bg-red-500/80 hover:bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-[10px] transition-colors" onclick="removeImage(${idx})">×</button>
                `;
                container.appendChild(div);
            });
        }

        window.removeImage = function (idx) {
            currentImagesBase64.splice(idx, 1);
            renderImagePreviews();
        };

        function addImageFile(file) {
            if (currentImagesBase64.length >= 5) {
                alert('Maximum 5 images allowed');
                return;
            }
            if (file && file.type.includes('image/')) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    currentImagesBase64.push(event.target.result);
                    renderImagePreviews();
                };
                reader.readAsDataURL(file);
            }
        }

        // Image Paste Handler
        chatInput.addEventListener('paste', (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let index in items) {
                const item = items[index];
                if (item.kind === 'file') {
                    addImageFile(item.getAsFile());
                }
            }
        });

        // File Upload Handler
        const fileUploadInput = document.getElementById('file-upload');
        document.getElementById('upload-btn').addEventListener('click', () => {
            fileUploadInput.click();
        });
        fileUploadInput.addEventListener('change', (e) => {
            const files = e.target.files;
            for (let i = 0; i < files.length; i++) {
                addImageFile(files[i]);
            }
            fileUploadInput.value = ''; // Reset
        });

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = chatInput.value.trim();
            if (!text && currentImagesBase64.length === 0) return;

            // Render message in UI
            let userHtml = text ? text + '\n' : '';
            if (currentImagesBase64.length > 0) {
                userHtml += '<div class="flex gap-2 flex-wrap mt-2 mb-2">';
                currentImagesBase64.forEach(img => {
                    userHtml += `<img src="${img}" class="max-w-[200px] h-32 object-cover rounded-lg border border-purple-500/30">`;
                });
                userHtml += '</div>';
            }
            addMessage(userHtml, 'user');

            showThinking();

            const payloadImages = [...currentImagesBase64];

            chatInput.value = '';
            currentImagesBase64 = [];
            renderImagePreviews();

            chatInput.disabled = true;
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<svg class="animate-spin h-5 w-5 text-slate-900" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';

            try {
                const res = await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, images: payloadImages })
                });
                if (!res.ok) {
                    const errorData = await res.json().catch(() => ({}));
                    throw new Error(errorData.error || 'Transmission error');
                }
            } catch (err) {
                removeThinking();
                if (err.message.includes('timeout')) {
                    alert('Command failed: Antigravity is busy generating a response or the input is locked. Please wait for it to finish.');
                } else {
                    alert('Command transmission failed: ' + err.message);
                }
            } finally {
                chatInput.disabled = false;
                sendBtn.disabled = false;
                sendBtn.innerHTML = '<span>Execute</span><svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>';
                chatInput.focus();
            }
        });

        async function loadProjects() {
            try {
                const res = await fetch('/api/projects');
                const data = await res.json();

                projectSelect.innerHTML = '';
                if (data.projects.length === 0) {
                    const opt = document.createElement('option');
                    opt.text = "No instances detected";
                    projectSelect.appendChild(opt);
                    projectSelect.disabled = true;
                    return;
                }

                data.projects.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.text = p.title.length > 45 ? p.title.substring(0, 42) + '...' : p.title;
                    projectSelect.appendChild(opt);
                });
                projectSelect.disabled = false;
            } catch (err) {
                console.error("Error synchronizing instances", err);
            }
        }

        projectSelect.addEventListener('change', async (e) => {
            const id = e.target.value;
            if (id === '') return;
            try {
                const loadingMsg = document.createElement('div');
                loadingMsg.className = 'text-center z-10 w-full mt-4';
                loadingMsg.innerHTML = '<div class="inline-block glass-panel px-6 py-2 rounded-full border-purple-500/30 text-purple-400 text-xs font-mono animate-pulse">Synchronizing project log...</div>';
                chatContainer.appendChild(loadingMsg);
                chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });

                await fetch('/api/set_project', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });

                const histRes = await fetch('/api/history');
                const histData = await histRes.json();

                chatContainer.innerHTML = '<div class="absolute inset-0 z-0 pointer-events-none opacity-[0.03]" style="background-image: linear-gradient(rgba(255,255,255,1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,1) 1px, transparent 1px); background-size: 40px 40px;"></div>';

                if (histData.messages.length === 0) {
                    const emptyMsg = document.createElement('div');
                    emptyMsg.className = 'text-center z-10 w-full mt-10';
                    emptyMsg.innerHTML = '<div class="inline-block glass-panel px-6 py-3 rounded-full border-slate-600/50 text-slate-400 text-sm font-mono">Communication log empty.</div>';
                    chatContainer.appendChild(emptyMsg);
                } else {
                    histData.messages.forEach(m => addMessage(m.text, m.role));
                }
            } catch (e) {
                console.error("Error synchronizing", e);
            }
        });

        document.getElementById('refresh-projects-btn').addEventListener('click', () => {
            projectSelect.innerHTML = '<option value="">Synchronizing...</option>';
            projectSelect.disabled = true;
            loadProjects();
        });

        async function renderTunnels() {
            try {
                const res = await fetch('/api/tunnels');
                const data = await res.json();

                tunnelsContainer.innerHTML = '';
                if (data.tunnels.length > 0) {
                    tunnelsContainer.classList.remove('hidden');
                    data.tunnels.forEach(t => {
                        const div = document.createElement('div');
                        div.className = 'bg-slate-800/80 px-3 py-1.5 rounded-md flex items-center gap-2 border border-purple-500/40 shadow-[0_0_10px_rgba(168,85,247,0.15)]';
                        div.innerHTML = `
                            <span class="text-cyan-400 font-bold uppercase">${t.proto || 'HTTP'} ${t.host || 'localhost'}:${t.port}</span> 
                            <span class="text-slate-500">|</span>
                            <a href="${t.url}" target="_blank" class="text-purple-300 hover:text-white transition-colors underline decoration-purple-500/50 underline-offset-2">${t.url}</a>
                            ${t.isPrimary ? '<span class="text-[10px] text-cyan-500 font-bold ml-2 uppercase px-1.5 py-0.5 rounded bg-cyan-500/10 border border-cyan-500/20">Primary</span>' : `<button class="text-slate-400 hover:text-red-400 ml-2 font-bold bg-slate-900/50 rounded-full w-5 h-5 flex items-center justify-center transition-colors" onclick="closeTunnel('${t.url}')">×</button>`}
                        `;
                        tunnelsContainer.appendChild(div);
                    });
                } else {
                    tunnelsContainer.classList.add('hidden');
                }
            } catch (e) {
                console.error('Error loading tunnels', e);
            }
        }

        window.closeTunnel = async function (url) {
            try {
                await fetch('/api/tunnel/close', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                renderTunnels();
            } catch (e) {
                alert('Error closing tunnel');
            }
        };

        tunnelBtn.addEventListener('click', async () => {
            const tunnelPort = document.getElementById('tunnel-port').value || 8080;
            const tunnelProto = document.getElementById('tunnel-proto').value || 'http';
            const tunnelHost = document.getElementById('tunnel-host').value || 'localhost';
            tunnelBtn.disabled = true;
            tunnelBtn.innerText = 'Initializing...';
            try {
                const res = await fetch('/api/tunnel', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ port: tunnelPort, proto: tunnelProto, host: tunnelHost })
                });
                const data = await res.json();
                if (data.url) {
                    tunnelBtn.innerText = 'Deploy Tunnel';
                    renderTunnels();
                } else {
                    throw new Error(data.error || 'Unknown error');
                }
            } catch (err) {
                alert('Deployment error: ' + err.message);
                tunnelBtn.innerText = 'Deploy Tunnel';
            } finally {
                tunnelBtn.disabled = false;
            }
        });

        loadProjects();
        renderTunnels();
    </script>
</body>

</html>
